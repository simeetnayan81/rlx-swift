name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same PR/ref so required checks reflect latest commits.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Tier-1: macOS xcodebuild (Metal). Tier-2: Linux CPU build + RLXCoreSmoke.
# Branch protection required status checks must use these exact job names:
#   - "macOS"
#   - "Linux (CPU smoke)"
# Do not require "iOS (smoke)" (optional compile; continue-on-error).

jobs:
  macos-test:
    name: macOS
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Metal toolchain (optional, newer Xcode)
        run: xcodebuild -downloadComponent MetalToolchain || true

      - name: Resolve
        run: swift package resolve

      - name: Build
        run: xcodebuild build -scheme rlx-swift-Package -destination 'platform=macOS'

      - name: Test
        run: xcodebuild test -scheme rlx-swift-Package -destination 'platform=macOS'

  linux-smoke:
    name: Linux (CPU smoke)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      # Official Swift 6.0+ for Linux; matches Package.swift tools-version floor.
      - name: Install Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.0"

      - name: Show toolchain
        run: swift --version

      # mlx-swift CPU backend needs OpenBLAS/LAPACK headers (cblas.h) + gfortran.
      - name: Install BLAS / LAPACK
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            build-essential \
            libblas-dev \
            liblapacke-dev \
            libopenblas-dev \
            gfortran

      - name: Build and RLXCoreSmoke
        run: ./scripts/linux-smoke.sh

  # Optional compile only — not a required status check.
  ios-build:
    name: iOS (smoke)
    runs-on: macos-15
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Metal toolchain (optional)
        run: xcodebuild -downloadComponent MetalToolchain || true

      - name: Build simulator
        run: xcodebuild build -scheme rlx-swift-Package -destination 'generic/platform=iOS Simulator'
