name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# swift-tools-version: 6.0 — runner default Xcode (16.x/26.x) is enough.
# Use xcodebuild for build/test: mlx-swift Cmlx Metal shaders need it.

jobs:
  macos-test:
    name: macOS
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Metal toolchain (optional, newer Xcode)
        run: xcodebuild -downloadComponent MetalToolchain || true

      - name: Resolve
        run: swift package resolve

      - name: Build
        run: xcodebuild build -scheme rlx-swift-Package -destination 'platform=macOS'

      - name: Test
        run: xcodebuild test -scheme rlx-swift-Package -destination 'platform=macOS'

  ios-build:
    name: iOS (smoke)
    runs-on: macos-15
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Metal toolchain (optional)
        run: xcodebuild -downloadComponent MetalToolchain || true

      - name: Build simulator
        run: xcodebuild build -scheme rlx-swift-Package -destination 'generic/platform=iOS Simulator'
