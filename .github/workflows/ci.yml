name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Tier-1: macOS build + test (design.md §27.10)
  macos-test:
    name: macOS swift test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer || sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Swift version
        run: swift --version

      # Xcode 16+ / 26+ may ship Metal compiler separately (mlx-swift Cmlx needs it).
      - name: Ensure Metal Toolchain
        run: xcodebuild -downloadComponent MetalToolchain || true

      # mlx-swift Metal shaders require xcodebuild (SwiftPM CLI cannot compile them).
      # See: https://github.com/ml-explore/mlx-swift#xcodebuild
      - name: Resolve package dependencies
        run: swift package resolve

      - name: Build (xcodebuild)
        run: xcodebuild build -scheme rlx-swift-Package -destination 'platform=macOS'

      - name: Test (xcodebuild)
        run: xcodebuild test -scheme rlx-swift-Package -destination 'platform=macOS'

  # Tier-2: iOS compile smoke (optional; not a full test matrix in v1)
  ios-build:
    name: iOS compile smoke
    runs-on: macos-15
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer || sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build for iOS simulator (generic)
        run: |
          swift build \
            --triple arm64-apple-ios17.0-simulator \
            -Xswiftc -sdk -Xswiftc "$(xcrun --sdk iphonesimulator --show-sdk-path)" \
            || xcodebuild -scheme rlx-swift-Package -destination 'generic/platform=iOS Simulator' build
