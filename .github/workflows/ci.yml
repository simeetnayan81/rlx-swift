name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Tier-1: macOS xcodebuild (Metal). Tier-2: Linux CPU build + RLXCoreSmoke.
# swift-tools-version: 6.0 — runner defaults are enough on both platforms.

jobs:
  macos-test:
    name: macOS
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Metal toolchain (optional, newer Xcode)
        run: xcodebuild -downloadComponent MetalToolchain || true

      - name: Resolve
        run: swift package resolve

      - name: Build
        run: xcodebuild build -scheme rlx-swift-Package -destination 'platform=macOS'

      - name: Test
        run: xcodebuild test -scheme rlx-swift-Package -destination 'platform=macOS'

  linux-smoke:
    name: Linux (CPU smoke)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      # Official Swift 6.0+ for Linux; matches Package.swift tools-version floor.
      - name: Install Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.0"

      - name: Show toolchain
        run: swift --version

      # mlx-swift CPU backend needs OpenBLAS/LAPACK headers (cblas.h) + gfortran.
      - name: Install BLAS / LAPACK
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            build-essential \
            libblas-dev \
            liblapacke-dev \
            libopenblas-dev \
            gfortran

      - name: Build and RLXCoreSmoke
        run: ./scripts/linux-smoke.sh

  ios-build:
    name: iOS (smoke)
    runs-on: macos-15
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Metal toolchain (optional)
        run: xcodebuild -downloadComponent MetalToolchain || true

      - name: Build simulator
        run: xcodebuild build -scheme rlx-swift-Package -destination 'generic/platform=iOS Simulator'
