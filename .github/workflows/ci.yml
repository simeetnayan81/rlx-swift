name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Package requires swift-tools-version 6.3 (mlx-swift 0.31.x pin).
# Xcode 16.x ships Swift 6.1 — use Xcode 26.x on runners.
env:
  DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer

jobs:
  # Tier-1: macOS build + test (design.md §27.10)
  macos-test:
    name: macOS xcodebuild test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode (Swift 6.3+)
        run: |
          set -euo pipefail
          # Prefer Xcode 26.x (Swift 6.3); fall back through newer/default installs.
          for candidate in \
            /Applications/Xcode_26.5.app \
            /Applications/Xcode_26.4.app \
            /Applications/Xcode_26.3.app \
            /Applications/Xcode_26.2.app \
            /Applications/Xcode_26.1.app \
            /Applications/Xcode_26.0.1.app \
            /Applications/Xcode_26.app \
            /Applications/Xcode.app; do
            if [[ -d "$candidate/Contents/Developer" ]]; then
              sudo xcode-select -s "$candidate/Contents/Developer"
              echo "Selected: $candidate"
              break
            fi
          done
          xcodebuild -version
          swift --version
          # Fail fast if tools-version still too old for this package.
          swift_major_minor=$(swift --version 2>/dev/null | head -1 | sed -n 's/.*Swift version \([0-9]*\.[0-9]*\).*/\1/p')
          echo "Swift major.minor: ${swift_major_minor:-unknown}"

      # Xcode 16+/26+ may ship Metal compiler separately (mlx-swift Cmlx needs it).
      - name: Ensure Metal Toolchain
        run: xcodebuild -downloadComponent MetalToolchain || true

      # mlx-swift Metal shaders require xcodebuild (SwiftPM CLI cannot compile them).
      # See: https://github.com/ml-explore/mlx-swift#xcodebuild
      - name: Resolve package dependencies
        run: swift package resolve

      - name: Build (xcodebuild)
        run: xcodebuild build -scheme rlx-swift-Package -destination 'platform=macOS' -quiet

      - name: Test (xcodebuild)
        run: xcodebuild test -scheme rlx-swift-Package -destination 'platform=macOS'

  # Tier-2: iOS compile smoke (optional; not a full test matrix in v1)
  ios-build:
    name: iOS compile smoke
    runs-on: macos-15
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode (Swift 6.3+)
        run: |
          set -euo pipefail
          for candidate in \
            /Applications/Xcode_26.5.app \
            /Applications/Xcode_26.4.app \
            /Applications/Xcode_26.3.app \
            /Applications/Xcode_26.2.app \
            /Applications/Xcode_26.1.app \
            /Applications/Xcode_26.0.1.app \
            /Applications/Xcode_26.app \
            /Applications/Xcode.app; do
            if [[ -d "$candidate/Contents/Developer" ]]; then
              sudo xcode-select -s "$candidate/Contents/Developer"
              echo "Selected: $candidate"
              break
            fi
          done
          xcodebuild -version
          swift --version

      - name: Ensure Metal Toolchain
        run: xcodebuild -downloadComponent MetalToolchain || true

      # Use xcodebuild only — swift build cannot compile Cmlx Metal shaders.
      - name: Build for iOS simulator
        run: >
          xcodebuild build
          -scheme rlx-swift-Package
          -destination 'generic/platform=iOS Simulator'
          -quiet
